# .github/workflows/sync_fb_data.yml
name: Sync Facebook Data Automate

on:
  schedule:
    # รันอัตโนมัติทุกๆ เที่ยงคืนเวลาสากล (ตรงกับเวลาไทย 07:00 น. เช้าของทุกวัน)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # อนุญาตให้เรากดปุ่มรันระบบด้วยตัวเองได้ตลอดเวลา

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
    # 1. เช็คเอาท์โปรเจกต์มาเตรียมไว้
    - name: Checkout repository code
      uses: actions/checkout@v3

    # 2. เตรียมโปรแกรม Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. ติดตั้งเครื่องมือเสริม (Requests) สำหรับใช้ดึงข้อมูลข้ามเว็บ
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. รันโค้ด Python ที่เราเขียนไว้ พร้อมส่งกุญแจลับให้มันด้วย
    - name: Run Fetch Python Script
      env:
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        FB_OBJECT_ID: ${{ secrets.FB_OBJECT_ID }}
      run: python fetch_fb_data.py

    # 5. เมื่อได้ไฟล์ข้อมูลใหม่มาแล้ว ให้เซฟทับและอัปเดตขึ้น GitHub อัตโนมัติ
    - name: Commit and Push update data to GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/traffic-data.json
        
        # เช็คว่ามีข้อมูลอะไรเปลี่ยนแปลงใหม่ไหม ถ้ามีให้อัปเดต
        if git diff-index --quiet HEAD --; then
          echo "วันนี้ข้อมูลยังเหมือนเดิม ไม่มีอะไรอัปเดต"
        else
          git commit -m "Auto Update: บันทึกข้อมูล Facebook Traffic ล่าสุด"
          git push
        fi
