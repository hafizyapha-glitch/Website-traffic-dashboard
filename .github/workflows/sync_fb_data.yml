steps:
- name: Checkout repository code
  uses: actions/checkout@v3

- name: Set up Python
  uses: actions/setup-python@v4
  with:
    python-version: '3.10'

- name: Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install requests

- name: Run Fetch Python Script
  env:
    FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
    FB_OBJECT_ID: ${{ secrets.FB_OBJECT_ID }}
  run: python fetch_fb_data.py

# แก้ไขตรงนี้: เปลี่ยนจากการ add ไฟล์ .json เป็น .csv ให้ตรงกับโค้ดใหม่
- name: Commit and Push update data to GitHub
  run: |
    git config --global user.name "github-actions[bot]"
    git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
    git add data/traffic-data.csv
    
    if git diff-index --quiet HEAD --; then
      echo "วันนี้ข้อมูลยังเหมือนเดิม ไม่มีอะไรอัปเดต"
    else
      git commit -m "Auto Update: บันทึกข้อมูล Facebook Ads Traffic ล่าสุดเป็น CSV"
      git push
    fi
