name: Sync Facebook Data Automate

on:
  schedule:
    # รันอัตโนมัติทุกๆ เที่ยงคืนเวลาสากล (UTC) ซึ่งตรงกับเวลาประมาณ 07:00 น. เช้าของทุกวันในประเทศไทย
    - cron: '0 0 * * *'
  workflow_dispatch:
    # เพิ่มบรรทัดนี้เพื่ออนุญาตให้คุณกดปุ่มรันสคริปต์ด้วยตัวเอง (Manual Trigger) ผ่านหน้าเว็บ Actions ได้ทุกเมื่อ

# สำคัญมาก: กำหนดสิทธิ์ให้ระบบบอทของ GitHub Actions สามารถเขียนไฟล์ (Write) และอัปโหลดกลับเข้า Repository ได้
permissions:
  contents: write

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
    # 1. เช็คเอาท์และดาวน์โหลดโค้ดทั้งหมดใน Repository ลงมาบนเครื่องเซิร์ฟเวอร์จำลอง
    - name: Checkout repository code
      uses: actions/checkout@v3

    # 2. ตั้งค่าระบบเพื่อรันโปรแกรมภาษา Python
    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. ติดตั้งไลบรารี requests ซึ่งจำเป็นสำหรับการยิง API ไปหา Facebook
    - name: Install required python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 4. สั่งรันสคริปต์ Python ที่เราเขียนไว้
    # โดยนำค่าตัวแปรลับ (Secrets) ที่เราตั้งค่าไว้บนเว็บ ส่งเข้าไปในระบบผ่าน Environment Variables
    - name: Run Fetch Python Script
      env:
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        FB_OBJECT_ID: ${{ secrets.FB_OBJECT_ID }}
      run: python fetch_fb_data.py

    # 5. ทำการตรวจเช็คไฟล์และอัปเดตกลับขึ้น GitHub
    - name: Commit and Push update data to GitHub
      run: |
        # ตั้งชื่อผู้เขียน (Author) เป็นบอทของ GitHub
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # เพิ่มไฟล์ CSV ที่เพิ่งดึงข้อมูลมาหมาดๆ เข้าสู่ระบบรอการบันทึก
        git add data/traffic-data.csv
        
        # ตรวจสอบว่ามีข้อมูลเปลี่ยนแปลงหรือไม่
        # หากข้อมูลเหมือนเดิม (ไม่มีการอัปเดตใหม่) จะข้ามขั้นตอนนี้ไปเพื่อไม่ให้ประวัติการแก้ไขรก
        if git diff-index --quiet HEAD --; then
          echo "สถานะ: ข้อมูลล่าสุดยังไม่มีการเปลี่ยนแปลง ข้ามการอัปเดต"
        else
          git commit -m "Auto Update: ซิงค์ข้อมูล Facebook Traffic ประจำวันสำเร็จ"
          git push
        fi
