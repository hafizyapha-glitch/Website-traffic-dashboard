<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <!-- เรียกใช้ Tailwind CSS ผ่าน CDN เพื่อความสวยงาม -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ฟอนต์ภาษาไทยจาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            /* พื้นหลังไล่สีแบบโมเดิร์น */
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md rounded-2xl shadow-2xl p-8 transform transition-all">
        <!-- โลโก้หรือไอคอน -->
        <div class="flex justify-center mb-6">
            <div class="bg-orange-500 p-3 rounded-full text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" />
                </svg>
            </div>
        </div>

        <h2 class="text-2xl font-semibold text-center text-gray-800 mb-8">เข้าสู่ระบบ</h2>

        <form id="loginForm" class="space-y-6">
            <!-- ช่องกรอกชื่อผู้ใช้ -->
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้ (Username)</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-colors bg-white/50 backdrop-blur-sm"
                    placeholder="กรอกชื่อผู้ใช้ของคุณ">
            </div>

            <!-- ช่องกรอกรหัสผ่าน -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน (Password)</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-colors bg-white/50 backdrop-blur-sm"
                    placeholder="กรอกรหัสผ่านของคุณ">
            </div>

            <!-- ข้อความแสดงข้อผิดพลาด (ซ่อนไว้เป็นค่าเริ่มต้น) -->
            <div id="errorMessage" class="hidden text-red-500 text-sm text-center font-medium bg-red-50 py-2 rounded-lg">
                ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!
            </div>

            <!-- ข้อความแสดงข้อผิดพลาดของระบบ (เช่น หาไฟล์ CSV ไม่เจอ) -->
            <div id="systemErrorMessage" class="hidden text-amber-600 text-xs text-center font-medium bg-amber-50 p-2 rounded-lg border border-amber-200">
                ไม่สามารถดึงข้อมูลระบบได้ กรุณาตรวจสอบว่ามีไฟล์ <br><b>./data/password/password.csv</b> อยู่ในระบบ
            </div>

            <!-- ปุ่มเข้าสู่ระบบ -->
            <button type="submit" id="submitBtn"
                class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium py-3 rounded-lg shadow-md hover:shadow-lg transition-all flex justify-center items-center">
                <span id="btnText">เข้าสู่ระบบ</span>
                <!-- ไอคอนโหลดดิ้ง (ซ่อนไว้) -->
                <svg id="loadingIcon" class="hidden animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-8">
            Copyright &copy; All Right Reserved
        </p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            // ป้องกันไม่ให้หน้าเว็บรีเฟรชเมื่อกด submit
            e.preventDefault();

            // ดึงค่าจากฟอร์ม
            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const systemErrorMsg = document.getElementById('systemErrorMessage');
            const btnText = document.getElementById('btnText');
            const loadingIcon = document.getElementById('loadingIcon');
            const submitBtn = document.getElementById('submitBtn');

            // ซ่อนข้อความแจ้งเตือนทั้งหมด
            errorMsg.classList.add('hidden');
            systemErrorMsg.classList.add('hidden');
            
            // เปลี่ยนปุ่มเป็นสถานะกำลังโหลด
            btnText.textContent = "กำลังตรวจสอบกับฐานข้อมูล...";
            loadingIcon.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                // ดึงข้อมูลไฟล์ CSV จากโฟลเดอร์ ./data/password/password.csv
                const response = await fetch('./data/password/password.csv');
                
                if (!response.ok) {
                    throw new Error('ไม่สามารถโหลดไฟล์ CSV ได้');
                }

                const csvText = await response.text();
                
                // แปลงไฟล์ CSV เป็น Array
                // รองรับการเว้นบรรทัดทั้งแบบ \r\n (Windows) และ \n (Unix)
                const rows = csvText.split(/\r?\n/).map(row => row.trim()).filter(row => row.length > 0);
                
                let isAuthenticated = false;

                // วนลูปเช็คข้อมูลในแต่ละแถวของ CSV
                for (let i = 0; i < rows.length; i++) {
                    // ข้ามแถวหัวตาราง (Header) หากมี เช่น username,password
                    if (i === 0 && (rows[i].toLowerCase().includes('username') || rows[i].toLowerCase().includes('password'))) {
                        continue;
                    }

                    // แยกข้อมูลด้วยเครื่องหมายจุลภาค (Comma)
                    const columns = rows[i].split(',');
                    if (columns.length >= 2) {
                        const csvUsername = columns[0].trim();
                        const csvPassword = columns[1].trim();

                        // ตรวจสอบความถูกต้องของ Username และ Password
                        if (userVal === csvUsername && passVal === csvPassword) {
                            isAuthenticated = true;
                            break;
                        }
                    }
                }

                if (isAuthenticated) {
                    btnText.textContent = "สำเร็จ! กำลังไปหน้าถัดไป";
                    loadingIcon.classList.add('hidden');
                    
                    // เปลี่ยนเส้นทางไปยังหน้า dashboard.html
                    window.location.href = 'dashboard.html';
                } else {
                    // แสดงข้อความแจ้งเตือนรหัสผ่านไม่ถูกต้อง
                    errorMsg.classList.remove('hidden');
                    resetSubmitButton();
                }

            } catch (error) {
                console.error('Error fetching/parsing CSV:', error);
                // แสดงข้อความแจ้งเตือนปัญหาระบบ (เช่น ไฟล์หาย หรือพิมพ์ path ผิด)
                systemErrorMsg.classList.remove('hidden');
                resetSubmitButton();
            }

            function resetSubmitButton() {
                btnText.textContent = "เข้าสู่ระบบ";
                loadingIcon.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
